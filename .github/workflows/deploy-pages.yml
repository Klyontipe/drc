name: Deploy frontend (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build static site
        run: |
          mkdir -p _site/avatars
          cp index.html _site/
          cp public/config.js _site/config.js
          cp public/drc-client.js _site/drc-client.js
          cp avatars/*.png _site/avatars/ 2>/dev/null || true
          echo 'davidramenecrepe.fr' > _site/CNAME
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
