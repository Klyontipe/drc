# Déploiement Render (gratuit) — connecte le repo GitHub Klyontipe/drc
# https://render.com → New Web Service → ce repo → auto-deploy à chaque push
#
# DNS OVH (Zone DNS davidramenecrepe.fr) — après avoir ajouté le domaine dans Render :
#   @   A     216.24.57.1              (remplace 213.186.33.5)
#   www CNAME team-drc.onrender.com.  (remplace l'A record www)
# Ne touche pas aux MX / SPF si tu utilises la messagerie OVH du domaine.
services:
  - type: web
    name: team-drc
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -b 0.0.0.0:$PORT --timeout 120 app:app
    healthCheckPath: /api/roulette
    domains:
      - davidramenecrepe.fr
      - www.davidramenecrepe.fr
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.2"
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: APP_URL
        value: https://davidramenecrepe.fr
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: DEBUG
        value: "false"
